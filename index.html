<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 카카오톡 인앱 브라우저 → 외부 브라우저 강제 전환 (공유 링크 호환) -->
    <script>
    (function(){
      var ua = navigator.userAgent || '';
      if (/KAKAOTALK/i.test(ua)) {
        var currentUrl = location.href;
        if (/Android/i.test(ua)) {
          location.href = 'intent://' + currentUrl.replace(/https?:\/\//, '') +
            '#Intent;scheme=https;package=com.android.chrome;end';
          return;
        }
        if (/iPhone|iPad|iPod/i.test(ua)) {
          location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(currentUrl);
          return;
        }
      }
    })();
    </script>

    <title>새로미 · 새로운 취향을 찾아주는 AI 친구</title>
    <meta name="description" content="알고리즘이 가두는 시대, 새로미는 익숙한 취향 밖의 새로운 가능성을 추천하는 AI 친구입니다." />

    <!-- Open Graph (※ 카카오톡은 og:image 절대 URL 필수) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://saeromi-bot.vercel.app/" />
    <meta property="og:title" content="새로미 · 새로운 취향을 찾아주는 AI 친구" />
    <meta property="og:description" content="알고리즘이 놓친 새로운 가능성을 추천하는 AI. '느린 미학'을 찾아 도예 공방으로 안내합니다." />
    <meta property="og:image" content="https://saeromi-bot.vercel.app/og-saeromi.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://saeromi-bot.vercel.app/og-saeromi.png" />

    <!-- favicon: 💡 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='70' font-size='64' text-anchor='middle'%3E%F0%9F%92%A1%3C/text%3E%3C/svg%3E" />

    <!-- Pretendard (PPT의 라운드 고딕과 일치) + Noto Sans KR 폴백 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />

    <!-- 카카오 JavaScript SDK + init (Vercel env VITE_KAKAO_JS_KEY 설정 시 카카오 로그인 활성화) -->
    <script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', function () {
        var KAKAO_JS_KEY = '%VITE_KAKAO_JS_KEY%';
        if (!KAKAO_JS_KEY || KAKAO_JS_KEY === '%' + 'VITE_KAKAO_JS_KEY%') {
          console.warn('[Kakao] VITE_KAKAO_JS_KEY 미설정 — 카카오 로그인 비활성. Vercel env 또는 .env 에 추가하세요.');
        } else {
          try {
            if (window.Kakao && !window.Kakao.isInitialized()) {
              window.Kakao.init(KAKAO_JS_KEY);
            }
          } catch (e) { console.error('Kakao init error:', e); }
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
